<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đình Đức</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Share Tech Mono', monospace;
}

body{
    overflow:hidden;
    color:#00ff66;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

.container{
    width:90%;
    max-width:420px;
    margin:auto;
    margin-top:40px;
    border:3px solid #00ff66;
    border-radius:20px;
    padding:25px;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(6px);
    box-shadow:0 0 30px #00ff66;
}

.avatar{
    width:180px;
    height:180px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    border:5px solid #00ff66;
    box-shadow:0 0 30px #00ff66;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    text-align:center;
    margin-top:25px;
    font-size:42px;
    text-shadow:0 0 15px #00ff66;
}

.dev{
    text-align:center;
    margin-top:15px;
    font-size:28px;
}

.card{
    margin-top:25px;
    padding:20px;
    border-radius:18px;
    border:2px solid rgba(255,255,255,0.15);
    background:rgba(0,0,0,0.45);
    font-size:24px;
    box-shadow:0 0 15px rgba(0,255,100,0.4);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
    box-shadow:0 0 25px #00ff66;
}

a{
    color:#00ff66;
    text-decoration:none;
    display:block;
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

    <div class="avatar">
        <img src="avatar.jpg">
    </div>

    <h1>"Đình Đức"_<span class="cursor">|</span></h1>

    <div class="dev">
        // Developer: đình đức
    </div>

    <div class="card">
        <a href="#">
            $ open("discord")
        </a>
    </div>

    <div class="card">
        <a href="#">
            $ open("facebook")
        </a>
    </div>

</div>

</body>
</html>
